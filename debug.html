<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CivicVois Debug</title>
  <style>body{font-family:system-ui;background:#0b1220;color:white;padding:32px}button{padding:12px 18px;border-radius:12px;border:0;margin-right:8px}pre{background:#111827;padding:18px;border-radius:14px;white-space:pre-wrap}</style>
</head>
<body>
  <h1>CivicVois Debug</h1>
  <p>Questa pagina testa la Netlify Function e il backend Netlify Blobs.</p>
  <button onclick="test('/.netlify/functions/civicvois-api?health=1')">Test health</button>
  <button onclick="test('/.netlify/functions/civicvois-api?backend=1')">Test backend</button>
  <pre id="out">Pronto.</pre>
  <script>
    async function test(url){
      const out=document.getElementById('out');
      out.textContent='Caricamento...';
      try{
        const r=await fetch(url,{cache:'no-store'});
        const t=await r.text();
        out.textContent='HTTP '+r.status+'\n\n'+t;
      }catch(e){
        out.textContent='Errore: '+e.message;
      }
    }
  </script>
</body>
</html>
