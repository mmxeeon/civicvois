<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#060d1a" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#060d1a" />
    <meta name="description" content="CivicVois è una piattaforma civica per segnalare problemi urbani, monitorare interventi e migliorare il territorio." />
    <title>CivicVois — Segnalazioni civiche intelligenti</title>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CivicVois" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <link rel="icon" sizes="192x192" href="/assets/icons/icon-192.png" />
    <link rel="icon" sizes="512x512" href="/assets/icons/icon-512.png" />
    <link rel="icon" href="assets/img/civicvois-logo.png" />
    <!-- Asset serviti localmente (no CDN runtime): font di sistema + Leaflet vendor.
         Vedi assets/vendor (generato da `npm run build:vendor`) e _headers per la CSP. -->
    <link rel="stylesheet" href="assets/vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <div class="boot-screen">
        <img src="assets/img/civicvois-logo.png" alt="CivicVois" class="boot-logo" />
        <div>
          <h1>CivicVois</h1>
          <p>Caricamento piattaforma...</p>
        </div>
      </div>
    </div>

    <template id="toast-template">
      <div class="toast" role="status"></div>
    </template>

    <script src="assets/vendor/leaflet/leaflet.js"></script>
    <script type="module" src="assets/js/app.js"></script>
    <!-- Registrazione service worker estratta in un file esterno: consente una
         Content-Security-Policy senza 'unsafe-inline' sugli script (vedi _headers). -->
    <script src="assets/js/sw-register.js"></script>
  </body>
</html>
