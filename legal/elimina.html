<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#060d1a" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#060d1a" />
    <meta name="description" content="CivicVois è una piattaforma civica per segnalare problemi urbani, monitorare interventi e migliorare il territorio." />
    <title>CivicVois — Segnalazioni civiche intelligenti</title>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CivicVois" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <link rel="icon" sizes="192x192" href="/assets/icons/icon-192.png" />
    <link rel="icon" sizes="512x512" href="/assets/icons/icon-512.png" />
    <link rel="icon" href="assets/img/civicvois-logo.png" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://unpkg.com" />
    <!-- Inter come fallback web font (SF Pro non è distribuibile via CDN) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <div class="boot-screen">
        <img src="assets/img/civicvois-logo.png" alt="CivicVois" class="boot-logo" />
        <div>
          <h1>CivicVois</h1>
          <p>Caricamento piattaforma...</p>
        </div>
      </div>
    </div>

    <template id="toast-template">
      <div class="toast" role="status"></div>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="assets/js/app.js"></script>

    <script>
      // Service worker solo nella PWA: in Capacitor (capacitor:// o http://localhost)
      // i SW non sono supportati / non hanno senso (gli asset sono già locali).
      (function () {
        var origin = window.location.origin || "";
        var isCapacitor = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
        var isLocalNative = origin === "http://localhost" || origin === "https://localhost" || origin.indexOf("capacitor://") === 0;
        if (isCapacitor || isLocalNative) return;
        if (!("serviceWorker" in navigator)) return;
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/service-worker.js").catch(function (error) {
            console.warn("Service worker CivicVois non registrato", error);
          });
        });
      })();
    </script>
  </body>
</html>
